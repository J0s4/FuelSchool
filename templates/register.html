<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="form-container">

    <h1>Crear Cuenta</h1>

    <form method="POST">

        <input type="text"
               name="name"
               placeholder="Nombre completo"
               required>

        <input type="text"
               name="identification"
               placeholder="Número de identificación"
               required>

        <button type="submit">
            Registrarse
        </button>

    </form>

    <p style="margin-top:20px;">
        ¿Ya tienes cuenta?
        <a href="/login">Iniciar sesión</a>
    </p>

</div>

</body>
</html>
